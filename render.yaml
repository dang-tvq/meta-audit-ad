services:
  - type: web
    name: meta-ad-analyzer
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: META_AD_ANALYZER_DATA_DIR
        value: /tmp/meta-ad-analyzer
